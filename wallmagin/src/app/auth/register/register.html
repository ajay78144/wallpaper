<div class="auth-wrapper">

  <div class="auth-left">
    <h1>Join WallMagin</h1>
    <p>Create account & upload your wallpapers</p>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="sub-text">Start your journey</p>

      <form>
        <div class="input-box">
          <input type="text" placeholder="Full Name">
        </div>

        <div class="input-box">
          <input type="text" placeholder="Mobile Number">
        </div>

        <div class="input-box">
          <input type="email" placeholder="Email Address">
        </div>

        <div class="input-box">
          <input type="password" placeholder="Password">
        </div>

        <button class="auth-btn">Register</button>
      </form>

      <p class="bottom-text">
        Already have an account?
        <a routerLink="/auth">Login</a>
      </p>
    </div>
  </div>

</div>
